<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rat Rush — Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" id="logoLink" style="cursor: pointer;">
            <span class="logo-icon">🐀</span>
            <span class="logo-text">RAT RUSH</span>
        </div>
        <div class="user-info">
            <span>💰 <span id="balance">5000</span> 🧀</span>
            <div class="avatar-nav" id="avatarNav">
                <span class="avatar-icon">🐀</span>
            </div>
            <button id="dailyBonusBtn" class="daily-btn">🎁 Daily</button>
        </div>
    </nav>

    <main>
        <div class="profile-header">
            <div class="avatar">🐀</div>
            <h2>SewerRat_42</h2>
            <p>Member since: Dec 2024</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>🏆 Cases opened</h3>
                <p id="totalOpened">0</p>
            </div>
            <div class="stat-card">
                <h3>⭐ Legendary rats</h3>
                <p id="legendaryCount">0</p>
            </div>
            <div class="stat-card">
                <h3>💎 Highest value drop</h3>
                <p id="highestDrop">0</p>
            </div>
        </div>

        <div class="profile-tabs">
            <button class="tab-btn active" data-tab="inventory">📦 Inventory</button>
            <button class="tab-btn" data-tab="history">📜 Drop History</button>
        </div>

        <div id="inventoryTab" class="tab-content active">
            <div class="inventory">
                <div class="inventory-header">
                    <h3>🐀 Your rat collection</h3>
                    <button id="sellAllBtn" class="sell-all-btn">💰 SELL ALL</button>
                </div>
                <div id="inventoryList" class="inventory-grid"></div>
            </div>
        </div>

        <div id="historyTab" class="tab-content" style="display: none;">
            <div class="history-section">
                <h3>📜 Drop History</h3>
                <div id="historyList" class="history-list"></div>
            </div>
        </div>
        
        <div class="danger-zone">
            <button id="clearDataBtn" class="clear-data-btn">⚠️ RESET ALL DATA</button>
        </div>
    </main>

    <script src="js/common.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
