<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Rush — Upgrade Roulette</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/upgrade.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" id="logoLink" style="cursor: pointer;">
            <span class="logo-icon">🐀</span>
            <span class="logo-text">RAT RUSH</span>
        </div>
        <div class="user-info">
            <span>💰 <span id="balance">5000</span> 🧀</span>
            <div class="avatar-nav" id="avatarNav">
                <span class="avatar-icon">🐀</span>
            </div>
            <button id="dailyBonusBtn" class="daily-btn">🎁 Daily</button>
        </div>
    </nav>

    <main>
        <section class="upgrade-hero">
            <h1>⬆️ UPGRADE ROULETTE 🎰</h1>
            <p>Risk your item for a chance to get something better!</p>
        </section>

        <section class="upgrade-container">
            <div class="current-item" id="currentItemDisplay">
                <p>Select an item from your inventory to upgrade</p>
            </div>

            <div class="roulette-area">
                <div class="roulette-wheel-upgrade" id="upgradeWheel">
                    <div class="wheel-segment" data-multiplier="0.5">❌ Lose (50%)</div>
                    <div class="wheel-segment" data-multiplier="1.2">⬆️ 1.2x</div>
                    <div class="wheel-segment" data-multiplier="1.5">⬆️ 1.5x</div>
                    <div class="wheel-segment" data-multiplier="2">⬆️ 2x</div>
                    <div class="wheel-segment" data-multiplier="3">🔥 3x</div>
                    <div class="wheel-segment" data-multiplier="5">💎 JACKPOT 5x</div>
                </div>
                <button id="spinUpgradeBtn" class="spin-btn" disabled>🎲 SPIN TO UPGRADE</button>
            </div>

            <div class="inventory-selector">
                <h3>Your items (click to select)</h3>
                <div id="upgradeInventoryList" class="upgrade-inventory-grid"></div>
            </div>
        </section>
    </main>

    <div id="upgradeResultModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="upgradeResultText" class="result-text">
                <div style="font-size: 3rem;">🎲</div>
                <p>Spinning...</p>
            </div>
            <button id="upgradeResultClose" class="modal-close-btn">Close</button>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/upgrade.js"></script>
</body>
</html>
